<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Chilordinv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="nav-host"></div>

<main>
  <section class="section">
    <div class="container">
      <div class="fadein" style="margin-bottom:48px">
        <div class="eyebrow">Contact</div>
        <h1 class="display" style="font-size:clamp(40px,5vw,64px)">Let's talk.</h1>
      </div>
      <div class="contact-grid">
        <div>
          <p style="color:var(--ink-2);font-size:16px">Drop us a message and we'll reply within 24 hours. For instant help, hit the WhatsApp button on the bottom right.</p>
          <ul class="contact-info-list" id="contactInfo"></ul>
        </div>
        <form class="contact-form" id="contactForm">
          <div class="field">
            <label for="cf-name">Your name</label>
            <input id="cf-name" name="name" type="text" required>
          </div>
          <div class="field">
            <label for="cf-email">Email</label>
            <input id="cf-email" name="email" type="email" required>
          </div>
          <div class="field">
            <label for="cf-subject">Subject</label>
            <input id="cf-subject" name="subject" type="text">
          </div>
          <div class="field">
            <label for="cf-message">Message</label>
            <textarea id="cf-message" name="message" required rows="5"></textarea>
          </div>
          <button class="btn btn-primary" type="submit" id="contactSubmit">Send message</button>
          <div id="contactStatus"></div>
        </form>
      </div>
    </div>
  </section>
</main>

<div id="footer-host"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/site.js"></script>
<script>
  mountLayout({ active: "contact", pathPrefix: "" });
  $("#contactInfo").innerHTML = `
    <li>${ICON.mail} <a href="mailto:${CONFIG.email}" style="text-decoration:underline;text-underline-offset:2px">${CONFIG.email}</a></li>
    <li>${ICON.phone} <a href="${waLink()}" target="_blank" rel="noreferrer" style="text-decoration:underline;text-underline-offset:2px">+${CONFIG.whatsapp}</a></li>
    <li>${ICON.pin} Lagos, Nigeria</li>
  `;
  initContactForm();
</script>
</body>
</html>
